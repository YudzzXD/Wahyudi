<!DOCTYPE html>
<html lang="en">
	<head>
		<title>Galeri tentang pacarku</title>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<link rel="stylesheet" href="galeri.css">
	</head>
	<body>

		<section class="gallery">
			<div class="container">
				<div class="row">
					<div class="gallery-filter">
						<span class="filter-item active" data-filter="all">Semua</span>
						<span class="filter-item" data-filter="vc">Video Call</span>
						<span class="filter-item" data-filter="pap">Foto</span>
						<span class="filter-item" data-filter="chat">Chat</span>
						<span class="filter-item" data-filter="fotbar">Foto Bareng</span>
					</div>
				</div>
				<div class="row">

					<div class="gallery-item travel">
						<div class="gallery-item-inner">
							<img src="https://freeimage.host/i/J85y2qb" alt="pap">
						</div>
					</div>

					<div class="gallery-item laptop">
						<div class="gallery-item-inner">
							<img src="https://freeimage.host/i/J85yArv" alt="pap">
						</div>
					</div>

					<div class="gallery-item photograph">
						<div class="gallery-item-inner">
							<img src="https://freeimage.host/i/J85ytCg" alt="vc">
						</div>
					</div>

					<div class="gallery-item watch">
						<div class="gallery-item-inner">
							<img src="https://freeimage.host/i/J87JCp2" alt="vc">
						</div>
					</div>

					<div class="gallery-item laptop">
						<div class="gallery-item-inner">
							<img src="https://freeimage.host/i/J87JV4a" alt="pap">
						</div>
					</div>

					<div class="gallery-item travel">
						<div class="gallery-item-inner">
							<img src="https://freeimage.host/i/J87J6v4" alt="pap">
						</div>
					</div>

					<div class="gallery-item photograph">
						<div class="gallery-item-inner">
							<img src="https://freeimage.host/i/J87JQZ7" alt="pap">
						</div>
					</div>

					<div class="gallery-item laptop">
						<div class="gallery-item-inner">
							<img src="https://freeimage.host/i/J87d3ZP" alt="pap">
						</div>
					</div>

					<div class="gallery-item watch">
						<div class="gallery-item-inner">
							<img src="https://freeimage.host/i/J87dncJ" alt="pap">
						</div>
					</div>

					<div class="gallery-item travel">
						<div class="gallery-item-inner">
							<img src="https://freeimage.host/i/J87daFs" alt="pap">
						</div>
					</div>

				</div>
			</div>
		</section>

		<script>
const filterContainer = document.querySelector(".gallery-filter"),
 galleryItems = document.querySelectorAll(".gallery-item");

 filterContainer.addEventListener("click", (event) =>{
if(event.target.classList.contains("filter-item")){
 filterContainer.querySelector(".active").classList.remove("active");
 event.target.classList.add("active");
 const filterValue = event.target.getAttribute("data-filter");
	 galleryItems.forEach((item) =>{
 if(item.classList.contains(filterValue) || filterValue === 'all'){
 	item.classList.remove("hide");
 	 item.classList.add("show");
 }
 else{
 	item.classList.remove("show");
 	item.classList.add("hide");
 }
	 });
}
 });
</script>
	</body>
</html>
